# CI quality gate — Deno (built-in tools).
#
# Copy to .github/workflows/ci.yml. Derived from the TypeScript gate with
# Deno-native commands — zero external dependencies (~45 lines).

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: Fmt + Lint + Check + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: denoland/setup-deno/validate-action@v2

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Typecheck
        run: deno check src/

      - name: Test with coverage
        run: deno test --coverage=coverage
