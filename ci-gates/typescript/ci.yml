# CI quality gate — TypeScript (Node + npm).
#
# Copy to .github/workflows/ci.yml. Adjust Node version and paths as needed.
# Radically simplified from a 544-line monorepo workflow to ~55 lines.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: Lint + Format + Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint -- --max-warnings 0

      - name: Format check
        run: npx prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npm run test -- --coverage

      - name: Build
        run: npm run build
