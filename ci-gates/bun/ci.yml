# CI quality gate — Bun (Biome).
#
# Copy to .github/workflows/ci.yml. Derived from the TypeScript gate with
# Bun-native commands (~45 lines).

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: Lint + Format + Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Lint + Format check (Biome)
        run: bunx biome check .

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test with coverage
        run: bun test --coverage
